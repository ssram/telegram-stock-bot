name: Telegram Command Listener

on:
  schedule:
    # Every 5 minutes, weekday daytime IST (8am-9pm IST = 2:30am-3:30pm UTC)
    # - cron: "*/5 2-15 * * 1-5"
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # allows manual trigger from the Actions tab

permissions:
  contents: write   # needed to commit the updated offset file back to the repo

jobs:
  listen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python listener.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALLOWED_USERS: ${{ secrets.TELEGRAM_ALLOWED_USERS }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_NAME: ${{ secrets.GOOGLE_SHEET_NAME }}

      - name: Commit updated offset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_update_id.txt
          git diff --staged --quiet || git commit -m "chore: update telegram offset"
          git push
